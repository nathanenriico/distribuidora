<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - VF Distribuidora</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="login-modal">
        <div class="login-content">
            <h2>Acesso Administrativo</h2>
            <form id="loginForm">
                <input type="password" id="adminPassword" placeholder="Digite a senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-cog"></i>
                <span>Admin</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-section="estoque">
                    <i class="fas fa-boxes"></i>
                    Estoque
                </a>
                <a href="#" class="nav-item" data-section="componentes">
                    <i class="fas fa-puzzle-piece"></i>
                    Componentes
                </a>
                <a href="#" class="nav-item" data-section="categorias">
                    <i class="fas fa-tags"></i>
                    Categorias
                </a>
                <a href="#" class="nav-item" data-section="cores">
                    <i class="fas fa-palette"></i>
                    Cores
                </a>
            </nav>
        </div>

        <div class="main-content">
            <header class="admin-header">
                <h1>Estoque</h1>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Sair
                </button>
            </header>

            <div class="content-area">
                <div class="toolbar">
                    <div class="search-area">
                        <input type="text" id="searchInput" placeholder="Pesquisar...">
                        <button class="filter-btn">Filtrar</button>
                    </div>
                    <button class="add-btn" onclick="openAddModal()">
                        <i class="fas fa-plus"></i>
                        Novo
                    </button>
                </div>

                <div class="table-container">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Componente</th>
                                <th>Estoque</th>
                                <th>Editar</th>
                                <th>Deletar</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr>
                                <td>#1234567H</td>
                                <td>Skol 350ml</td>
                                <td>1245</td>
                                <td><button class="edit-btn"><i class="fas fa-edit"></i></button></td>
                                <td><button class="delete-btn"><i class="fas fa-trash"></i></button></td>
                            </tr>
                            <tr>
                                <td>#1234567H</td>
                                <td>Brahma 600ml</td>
                                <td>987</td>
                                <td><button class="edit-btn"><i class="fas fa-edit"></i></button></td>
                                <td><button class="delete-btn"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Adicionar Produto</h3>
                <button class="close-btn" onclick="closeAddModal()">&times;</button>
            </div>
            <form id="addProductForm">
                <div class="form-group">
                    <label>Nome do Produto:</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Marca:</label>
                    <select id="productBrand" required>
                        <option value="">Selecione a marca</option>
                        <option value="skol">Skol</option>
                        <option value="brahma">Brahma</option>
                        <option value="itaipava">Itaipava</option>
                        <option value="budweiser">Budweiser</option>
                        <option value="amstel">Amstel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Volume (ml):</label>
                    <input type="number" id="productVolume" required>
                </div>
                <div class="form-group">
                    <label>Preço (R$):</label>
                    <input type="number" step="0.01" id="productPrice" required>
                </div>
                <div class="form-group">
                    <label>Estoque:</label>
                    <input type="number" id="productStock" required>
                </div>
                <div class="form-group">
                    <label>Categoria:</label>
                    <select id="productCategory" required>
                        <option value="">Selecione a categoria</option>
                        <option value="* CERVEJAS 1 *">* CERVEJAS 1 *</option>
                        <option value="* CERVEJAS 2 *">* CERVEJAS 2 *</option>
                        <option value="* DESTILADOS 1 *">* DESTILADOS 1 *</option>
                        <option value="* REFRIGERANTES 1 *">* REFRIGERANTES 1 *</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closeAddModal()">Cancelar</button>
                    <button type="submit">Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
